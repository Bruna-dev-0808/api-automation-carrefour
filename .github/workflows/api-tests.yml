name: API Tests

on:
  push:
    branches:
      - principal

  pull_request:
    branches:
      - principal

jobs:
  newman:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: |
          newman run coleções/api-automation-Carrefour.postman_collection.json \
          -e ambientes/Carrefour\ QA.postman_environment.json
